# PostgreSQL 16+ для CoffeeOS
# Multi-tenant архитектура с RLS (Row Level Security)

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USER") { "postgres" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "123456" } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>

development:
  <<: *default
  database: coffeeos_development

test:
  <<: *default
  database: coffeeos_test

production:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "coffeeos_production" } %>
  url: <%= ENV.fetch("DATABASE_URL") { "" } %>
