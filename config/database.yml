# PostgreSQL 16+ для CoffeeOS
# Multi-tenant архитектура с RLS (Row Level Security)

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: "<%= ENV.fetch("DATABASE_USER") { "postgres" } %>"
  password: "<%= ENV.fetch("DATABASE_PASSWORD") { "123456" } %>"
  # Prefer IPv4 loopback to avoid IPv6 (::1) pg_hba mismatches on Windows installs.
  host: "<%= ENV.fetch("DATABASE_HOST") { "127.0.0.1" } %>"
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
  # Avoid SSL negotiation issues on local dev/test Postgres installs.
  sslmode: "<%= ENV.fetch("DATABASE_SSLMODE") { "disable" } %>"

development:
  <<: *default
  database: coffeeos_development

test:
  <<: *default
  database: coffeeos_test

# Solid Cache / Solid Queue / Solid Cable — именованные БД; один Postgres (Render) = один DATABASE_URL.
# В продакшн используем только DATABASE_URL (External URL из Render dashboard).
# Не наследуем default чтобы sslmode:disable не блокировал SSL-соединение с Render Postgres.
production:
  primary: &production_primary
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *production_primary
    migrations_paths: db/cache_migrate
  queue:
    <<: *production_primary
    migrations_paths: db/queue_migrate
  cable:
    <<: *production_primary
    migrations_paths: db/cable_migrate
