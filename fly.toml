# fly.toml — CoffeeOS deploy config
# Docs: https://fly.io/docs/reference/configuration/

app = "coffeeos"
primary_region = "fra"

[build]

[env]
  APP_HOST          = "coffeeos.fly.dev"
  PORT              = "3000"
  RAILS_ENV         = "production"
  RAILS_LOG_TO_STDOUT = "true"
  RAILS_SERVE_STATIC_FILES = "true"
  WEB_CONCURRENCY   = "0"
  RAILS_MAX_THREADS = "3"

[http_service]
  internal_port = 3000
  force_https   = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    grace_period = "120s"
    interval     = "15s"
    method       = "GET"
    path         = "/up"
    port         = 3000
    timeout      = "10s"
    type         = "http"
